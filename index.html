        .container {

            margin: 0 auto;
        }

        /* 顶部导航栏 */
        .top-bar {
            background: white;
            border-radius: 56px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);

            justify-content: space-between;

            gap: 1rem;

        }

        h1 {
            font-size: 1.8rem;
            font-weight: 650;
            background: linear-gradient(130deg, #7c9e7a, #bbcea8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }

            background: #fff7ef;
            border: none;
            padding: 0.45rem 1.2rem;
            border-radius: 40px;

            font-weight: 500;
            color: #5c5342;
            cursor: pointer;

            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .chapter-btn.active {
            background: var(--mint-soft);
            color: #2a5a3e;
            border: 1px solid var(--correct-border);
            box-shadow: 0 4px 10px rgba(129, 168, 117, 0.2);
        }

        .all-btn.active {
            background: var(--butter);

        }

        /* 题目卡片 */
        .question-card {

            padding: 1.5rem 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: 0.1s;
            border: 1px solid #f2ebdb;
        }

        .question-header {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .q-type {
            background: var(--lavender-light);
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #51457a;
            letter-spacing: 0.3px;
        }

        .q-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.45;
            color: #2e2c27;
            background: #fefbf5;
            padding: 0.6rem 1rem;
            border-radius: 28px;
            margin: 0.5rem 0 1rem 0;

            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            margin: 0.8rem 0 0.4rem;

            min-width: 150px;
            background: #faf7f0;
            border-radius: 80px;
            padding: 0.6rem 1.3rem;
            text-align: center;
            font-weight: 500;
            color: #4c473b;
            border: 1px solid #e6decb;
            transition: 0.05s linear;
            cursor: default;

        .option-item.correct {
            background: var(--correct-green);
            border-color: var(--correct-border);
            color: #1f482c;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(111, 158, 120, 0.2);
        }

        /* 填空题专用 */
        .fill-answer-area {
            background: #f5f2e6;
            border-radius: 28px;
            padding: 0.8rem 1.2rem;
            margin-top: 0.8rem;
            display: inline-block;
            width: auto;
            border-left: 6px solid var(--mint-bright);
        }

        .fill-label {
            font-weight: 700;
            color: #6f784a;
            margin-right: 0.8rem;
        }

        .fill-badge {
            background: white;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            color: #2d733c;
            font-weight: 500;
            margin-right: 0.5rem;
            display: inline-block;
        }

        hr {
            margin: 0.5rem 0;
            border-color: #efe6d4;
        }

        .empty-tip {

            padding: 3rem;
            background: #fff9ef;

            color: #afaa95;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #cfc7b2;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .question-card {
                padding: 1rem;
            }
            .option-item {
                min-width: 110px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

		{ chapterId: 0, type: "多选", text: "习近平强调，40年的实践充分证明，改革开放（ ）", options: ["A、是决定实现“两个一百年”奋斗目标、实现中华民族伟大复兴的关键一招。", "B、是决定当代中国命运的关键一招", "C、是党和人民大踏步赶上时代的重要法宝", "D、是坚持和发展中国特色社会主义的必由之路"], correctAnswers: ["A","B","C","D"] },
		{ chapterId: 0, type: "多选", text: "马克思主义关于社会生产力发展的理论（ ）", options: ["A、经济基础决定上层建筑", "B、生产关系和上层建筑具有反作用", "C、生产力决定生产关系", "D、任何社会均由生产力与生产关系、经济基础与上层建筑构成基本框架"], correctAnswers: ["A","B","C","D"] },

		{ chapterId: 0, type: "多选", text: "生产力的发展，主要涉及（ ）、（ ）和（ ）三大实体性要素", options: ["A、劳动资料", "B、劳动力", "C、生产关系", "D、劳动对象"], correctAnswers: ["A","B","D"] },
		{ chapterId: 0, type: "多选", text: "党的十一届三中全会，我党基于（ ）做出改革开放的重要决策。", options: ["A、时代背景", "B、政治背景", "C、国内背景", "D、国际背景"], correctAnswers: ["A","C","D"] },
		{ chapterId: 0, type: "多选", text: "“创新是改革开放的生命。”这是（ ）", options: ["A、改革开放40年实践的重要启示", "B、是改革开放生生不息、持续不止的生命源泉", "C、是中华民族、中国特色社会主义、中国人民“三个伟大飞跃”的巨大动力", "D、习近平总书记在庆祝改革开放40周年大会上的重要讲话内容"], correctAnswers: ["A","B","C","D"] },
		{ chapterId: 0, type: "多选", text: "1979年7月15日，中央正式批准（ ）两省在对外经济活动中实行特殊政策、灵活措施，迈开了改革开放的历史性脚步。", options: ["A、福建", "B、广东", "C、海南", "D、江苏"], correctAnswers: ["A","B"] },

		// ---------- 填空题 ----------
		{ chapterId: 0, type: "填空", text: "20世纪70年代以后，国际形势和世界政治格局发生了重大变化，（ ）与（ ）逐步成为世界潮流", fillAnswers: ["和平", "发展"] },

		{ chapterId: 0, type: "判断", text: "十六大以后，中国进入全面深化改革新时期。", options: ["正确", "错误"], correctAnswers: ["错误"] },
		{ chapterId: 0, type: "判断", text: "1984年邓小平的“南方谈话”发布中国改革进入了新的阶段。", options: ["正确", "错误"], correctAnswers: ["错误"] },
		{ chapterId: 0, type: "判断", text: "创新是改革开放的生命。“这是改革开放40年实践的重要启示，是改革开放生生不息、持续不止的生命源泉，是中华民族、中国特色社会主义、中国人民“三个伟大飞跃”的巨大动力。", options: ["正确", "错误"], correctAnswers: ["正确"] },

    // ===================== 章节1: 本节测验 (十一届三中全会等) =====================
    questionsData.push(
		{ chapterId: 1, type: "单选", text: "党的十一届三中全会是在（ ）召开", options: ["A、1978年12月15日", "B、1978年12月18日", "C、1978年11月10日", "D、1978年12月13日"], correctAnswers: ["B"] },

		{ chapterId: 1, type: "单选", text: "邓小平的这篇主题为“解放思想，实事求是，团结一致向前看”的讲话成为随后召开（ ）的主题报告的主导内容", options: ["A、十一届三中全会", "B、十四大", "C、十三大", "D、十二大"], correctAnswers: ["A"] },
		{ chapterId: 1, type: "单选", text: "党的（ ）审议并一致通过《关于建国以来党的若干历史问题的决议》。", options: ["A、十一届六中全会", "B、十二届六中全会", "C、十一届三中全会", "D、十二届三中全会"], correctAnswers: ["A"] },
		{ chapterId: 1, type: "单选", text: "“科学技术是第一生产力”的论断是（ ）提出的。", options: ["A、习近平", "B、列宁", "C、马克思", "D、邓小平"], correctAnswers: ["D"] },
		{ chapterId: 1, type: "单选", text: "1980年，温州成立工商所，（ ）成为温州第一个获得执照的个体户。", options: ["A、章华妹", "B、年广九", "C、鲁冠球", "D、吴仁宝"], correctAnswers: ["A"] },
		{ chapterId: 1, type: "单选", text: "1990年，中共中央、国务院为进一步对外开放而作出的战略举措是（ ）", options: ["A、开发、开放上海浦东新区", "B、开发、开放海南经济特区", "C、建立厦门经济特区", "D、建立珠海经济特区"], correctAnswers: ["A"] },
		{ chapterId: 1, type: "单选", text: "1978年5月10日,中央党校内部刊物《理论动态》第 60期刊登(《 》),在全国引起强烈反响,掀起了真理标准问题大讨论。", options: ["A、实践是检验真理的唯一标准", "B、真理是检验实践的唯一标准", "C、两个凡是", "D、马克思主义的一个最基本的原则"], correctAnswers: ["A"] },
		{ chapterId: 1, type: "单选", text: "我国第一家信托投资公司成立于（ ）", options: ["A、1979年10月", "B、1949年5月", "C、1979年3月", "D、1984年11月"], correctAnswers: ["A"] },
		{ chapterId: 1, type: "单选", text: "2020是上海浦东开发开放（ ）周年。", options: ["A、10周年", "B、30周年", "C、40周年", "D、20周年"], correctAnswers: ["B"] },
		{ chapterId: 1, type: "单选", text: "邓小平在会上指出，四个现代化，关键是（ ）", options: ["A、国防现代化", "B、科学技术现代化", "C、工业现代化", "D、农业现代化"], correctAnswers: ["B"] },
		{ chapterId: 1, type: "单选", text: "在计划经济体制下，企业吃国家的“大锅饭”，职工吃企业的“大锅饭”。这一局面得到扭转主要得益于", options: ["A、联产承包责任制", "B、国有企业改革", "C、大跃进运动", "D、以阶级斗争为纲"], correctAnswers: ["B"] },
		{ chapterId: 1, type: "单选", text: "1977年冬天，关闭（ ）年之久的高考考场大门重新打开。", options: ["A、11", "B、12", "C、15", "D、10"], correctAnswers: ["A"] },
		{ chapterId: 1, type: "单选", text: "1984年5月4日，中共中央、国务院批转《沿海部分城市座谈会纪要》，决定进一步开放（ ）、上海、大连、秦皇岛、烟台、青岛、连云港、南通、宁波、温州、福州、广州、湛江和北海等14个沿海港口城市，并提出逐步兴办经济技术开发区。", options: ["A、南京", "B、泉州", "C、天津", "D、厦门"], correctAnswers: ["C"] },

    // ---------- 以下为渲染引擎 + 导航栏 (无需修改，会自动根据以上数据展示) ----------
    const chapters = [
        { name: "绪论测验", id: 0 },
        { name: "第一章", id: 1 },

        { name: "第三章", id: 3 },

    ];

    let currentChapterId = "all";  // "all" 或 数字id

    // 渲染题目列表
    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        let filtered = [];
        if (currentChapterId === "all") {
            for (let i = 0; i < chapters.length; i++) {
                filtered.push(...questionsData.filter(q => q.chapterId === i));
            }
        } else {
            filtered = questionsData.filter(q => q.chapterId === currentChapterId);
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-tip">📭 当前章节暂无题目，请按照上方数据格式在 questionsData 中添加题目～<br>✨ 参考已有的样例，直接复制并修改即可。</div>`;
            return;
        }

        let html = '';
        filtered.forEach((item, idx) => {
            let typeLabel = '';
            if (item.type === '单选') typeLabel = '🔘 单选题';
            else if (item.type === '多选') typeLabel = '☑️ 多选题';
            else if (item.type === '判断') typeLabel = '⚖️ 判断题';
            else if (item.type === '填空') typeLabel = '📝 填空题';
            else typeLabel = item.type;

            html += `<div class="question-card">
                        <div class="question-header">
                            <span class="q-type">${typeLabel}</span>
                        </div>
                        <div class="q-text">${idx+1}. ${item.text}</div>`;

            // 处理填空题 (展示正确答案)
            if (item.type === '填空' && item.fillAnswers && item.fillAnswers.length) {
                let fillHtml = `<div class="fill-answer-area"><span class="fill-label">✍️ 正确答案：</span>`;
                item.fillAnswers.forEach(ans => {
                    fillHtml += `<span class="fill-badge">${ans}</span>`;
                });
                fillHtml += `</div>`;
                html += fillHtml;
            } 
            // 判断题或者普通多选/单选（使用options）
            else if (item.type === '判断' || (item.options && item.options.length)) {
                html += `<div class="options-area">`;
                const opts = item.options;
                for (let opt of opts) {
                    let isCorrect = false;
                    if (item.type === '判断') {
                        // 判断类型的正确匹配：“正确” 或 “错误”
                        const judgeCorrectText = (item.correctAnswers && item.correctAnswers[0]) || '';
                        isCorrect = (opt === judgeCorrectText);
                    } else {
                        // 单选或多选：提取选项首字母（A、B、C、D...）
                        let optLetter = opt.charAt(0);
                        if (item.correctAnswers && item.correctAnswers.includes(optLetter)) {
                            isCorrect = true;
                        }
                    }
                    const correctClass = isCorrect ? 'correct' : '';
                    html += `<div class="option-item ${correctClass}">${opt}</div>`;
                }
                html += `</div>`;
            } 
            // 容错：没有任何options和填空则展示占位
            else {
                html += `<div style="padding:0.5rem; color:#9b927c;">⚠️ 题目格式缺失选项或填空答案，请检查数据。</div>`;
            }
            html += `</div>`;
        });
        container.innerHTML = html;
    }

    // 生成底部导航按钮
    function buildNav() {
        const navDiv = document.getElementById('chapterNav');
        let btns = `<button class="chapter-btn all-btn ${currentChapterId === 'all' ? 'active' : ''}" data-chapter="all">📚 全部章节 · 顺序复习</button>`;
        chapters.forEach(ch => {
            btns += `<button class="chapter-btn ${currentChapterId === ch.id ? 'active' : ''}" data-chapter="${ch.id}">📖 ${ch.name}</button>`;
        });
        navDiv.innerHTML = btns;
        // 绑定事件
        document.querySelectorAll('[data-chapter]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const val = btn.getAttribute('data-chapter');
                if (val === 'all') {
                    currentChapterId = 'all';
                } else {
                    currentChapterId = parseInt(val);
                }
                buildNav();    // 重绘激活状态
                renderQuestions();  // 刷新题目
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    }

    // 初始化页面
    buildNav();
    renderQuestions();
</script>
